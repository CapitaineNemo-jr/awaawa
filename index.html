<!DOCTYPE html>
<html lang="ja" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>旅行プランナー</title>
  <meta name="theme-color" content="#38bdf8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
/* =============================================
   CSS変数（ライト / ダークモード）
============================================= */
:root {
  --c-bg:        #f0f4f8;
  --c-surface:   #ffffff;
  --c-surface2:  #f8fafc;
  --c-border:    #e2e8f0;
  --c-text:      #1e293b;
  --c-muted:     #64748b;
  --c-primary:   #0ea5e9;
  --c-primary-d: #0284c7;
  --c-green:     #10b981;
  --c-red:       #ef4444;
  --c-orange:    #f59e0b;
  --radius-sm:   6px;
  --radius-md:   12px;
  --radius-lg:   18px;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.08);
  --shadow-md:   0 4px 12px rgba(0,0,0,.10);
  --shadow-lg:   0 8px 24px rgba(0,0,0,.14);
  --font:        'Noto Sans JP', sans-serif;
}
[data-theme="dark"] {
  --c-bg:        #0f172a;
  --c-surface:   #1e293b;
  --c-surface2:  #273449;
  --c-border:    #334155;
  --c-text:      #f1f5f9;
  --c-muted:     #94a3b8;
  --c-primary:   #38bdf8;
  --c-primary-d: #0ea5e9;
  --shadow-sm:   0 1px 3px rgba(0,0,0,.3);
  --shadow-md:   0 4px 12px rgba(0,0,0,.4);
  --shadow-lg:   0 8px 24px rgba(0,0,0,.5);
}

/* =============================================
   リセット & ベース
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: var(--c-bg);
  color: var(--c-text);
  display: flex;
  justify-content: center;
  min-height: 100dvh;
  transition: background .2s, color .2s;
}
a { color: var(--c-primary); }

.app-shell {
  width: 100%; max-width: 480px; min-height: 100dvh;
  background: var(--c-surface);
  display: flex; flex-direction: column; position: relative;
  box-shadow: var(--shadow-lg);
  transition: background .2s;
}

/* =============================================
   画面
============================================= */
.screen { display: none; flex-direction: column; flex: 1; height: 100dvh; }
.screen.active { display: flex; }

/* =============================================
   ローディング
============================================= */
.loading-overlay {
  position: fixed; inset: 0;
  background: rgba(255,255,255,.75);
  backdrop-filter: blur(3px);
  display: none; justify-content: center; align-items: center;
  z-index: 200; flex-direction: column; gap: 12px;
}
[data-theme="dark"] .loading-overlay { background: rgba(15,23,42,.8); }
.loading-overlay.active { display: flex; }
.spinner {
  width: 36px; height: 36px; border-radius: 50%;
  border: 3px solid var(--c-border);
  border-top-color: var(--c-primary);
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 13px; color: var(--c-muted); }

/* =============================================
   トースト
============================================= */
#toast-container {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%);
  display: flex; flex-direction: column; gap: 8px;
  z-index: 300; pointer-events: none;
  width: min(90%, 400px);
}
.toast {
  padding: 12px 16px; border-radius: var(--radius-md);
  font-size: 14px; font-weight: 500;
  box-shadow: var(--shadow-md);
  animation: toastIn .25s ease forwards;
  pointer-events: all;
}
.toast.success { background: #dcfce7; color: #166534; border-left: 4px solid var(--c-green); }
.toast.error   { background: #fee2e2; color: #991b1b; border-left: 4px solid var(--c-red); }
.toast.info    { background: #e0f2fe; color: #0c4a6e; border-left: 4px solid var(--c-primary); }
.toast.warning { background: #fef9c3; color: #713f12; border-left: 4px solid var(--c-orange); }
.toast.fade-out { animation: toastOut .3s ease forwards; }
@keyframes toastIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { to   { opacity:0; transform:translateY(10px); } }

/* =============================================
   フォーム部品
============================================= */
.form-label { font-size: 12px; color: var(--c-muted); font-weight: 500; display: block; margin-bottom: 4px; }
.form-group { margin-bottom: 14px; }
input[type="text"], input[type="password"], input[type="time"],
input[type="number"], input[type="datetime-local"], input[type="date"], select {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid var(--c-border); border-radius: var(--radius-sm);
  font-size: 15px; font-family: var(--font);
  background: var(--c-surface); color: var(--c-text);
  outline: none; transition: border-color .15s, background .2s;
}
input:focus, select:focus { border-color: var(--c-primary); }

/* =============================================
   ボタン
============================================= */
.btn {
  display: inline-flex; justify-content: center; align-items: center; gap: 6px;
  padding: 11px 18px; border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-family: var(--font); font-weight: 600;
  cursor: pointer; transition: filter .15s, transform .1s;
  text-decoration: none; white-space: nowrap;
}
.btn:active { transform: scale(.97); }
.btn:hover  { filter: brightness(1.07); }
.btn-primary  { background: var(--c-primary); color: #fff; width: 100%; }
.btn-success  { background: var(--c-green);   color: #fff; width: 100%; }
.btn-danger   { background: var(--c-red);     color: #fff; }
.btn-neutral  { background: #94a3b8;           color: #fff; width: 100%; }
.btn-outline-danger {
  background: transparent; color: var(--c-red);
  border: 1.5px solid var(--c-red);
  padding: 4px 10px; font-size: 12px; border-radius: var(--radius-sm);
}
.btn-ghost {
  background: none; border: none; color: var(--c-muted);
  padding: 4px 8px; font-size: 20px; cursor: pointer; width: auto;
}
.btn-sm { padding: 5px 12px; font-size: 12px; width: auto; }
.btn-fab {
  position: absolute; right: 18px; bottom: 76px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--c-primary); color: #fff;
  border: none; font-size: 26px; cursor: pointer;
  box-shadow: 0 4px 14px rgba(14,165,233,.45);
  display: flex; justify-content: center; align-items: center;
  z-index: 10; transition: transform .15s, box-shadow .15s;
}
.btn-fab:hover  { transform: scale(1.08); }
.btn-fab:active { transform: scale(.95); }
.btn-row { display: flex; gap: 8px; }
.btn-row .btn { flex: 1; }

/* =============================================
   モーダル
============================================= */
.modal {
  display: none; position: absolute; inset: 0;
  background: rgba(15,23,42,.5); backdrop-filter: blur(2px);
  justify-content: center; align-items: center; z-index: 100;
}
.modal.active { display: flex; }
.modal-content {
  background: var(--c-surface); border-radius: var(--radius-lg);
  padding: 22px; width: 88%; max-height: 85dvh; overflow-y: auto;
  box-shadow: var(--shadow-lg);
}
.modal-title { font-size: 17px; font-weight: 700; margin-bottom: 16px; color: var(--c-text); }

/* =============================================
   ダークモードトグル
============================================= */
.darkmode-btn {
  background: none; border: 1.5px solid var(--c-border);
  border-radius: 20px; padding: 4px 10px;
  font-size: 14px; cursor: pointer; color: var(--c-muted);
  transition: all .2s; display: flex; align-items: center; gap: 4px;
}
.darkmode-btn:hover { border-color: var(--c-primary); color: var(--c-primary); }

/* =============================================
   ログイン画面
============================================= */
#screen-login {
  justify-content: center; padding: 32px 24px;
  background: linear-gradient(160deg, #0ea5e9 0%, #0f172a 100%);
}
#screen-register, #screen-setup-name, #screen-reset {
  justify-content: center; padding: 32px 24px;
  background: linear-gradient(160deg, #0ea5e9 0%, #0f172a 100%);
}
.login-card {
  background: #fff; border-radius: var(--radius-lg);
  padding: 28px 22px; box-shadow: var(--shadow-lg);
}
.login-logo { text-align: center; margin-bottom: 20px; }
.login-logo .icon { font-size: 42px; }
.login-logo h1 { font-size: 22px; font-weight: 700; color: #1e293b; margin-top: 6px; }
.forgot-link { font-size: 12px; color: var(--c-primary); text-align: right; cursor: pointer; margin-bottom: 4px; }

/* =============================================
   グループ画面
============================================= */
#screen-group { overflow: hidden; }
.group-header {
  padding: 14px 18px;
  border-bottom: 1px solid var(--c-border);
  display: flex; justify-content: space-between; align-items: center;
}
.group-header h2 { font-size: 20px; font-weight: 700; }
.group-header-right { display: flex; align-items: center; gap: 8px; }
.user-chip { display: flex; align-items: center; gap: 6px; }
.user-chip span { font-size: 13px; color: var(--c-muted); }
.group-list { flex: 1; overflow-y: auto; padding: 12px 16px 80px; }

/* グループカード */
.group-item {
  border-radius: var(--radius-md); margin-bottom: 10px;
  display: flex; align-items: stretch; overflow: hidden;
  box-shadow: var(--shadow-sm); border: 1px solid var(--c-border);
  transition: box-shadow .15s;
}
.group-item:hover { box-shadow: var(--shadow-md); }
.group-cover {
  width: 6px; flex-shrink: 0;
}
.group-item-inner {
  flex: 1; padding: 14px 16px; background: var(--c-surface);
  display: flex; align-items: center;
}
.group-item-body { flex: 1; cursor: pointer; padding-right: 8px; word-break: break-all; }
.group-item-name { font-weight: 700; font-size: 15px; }
.group-item-meta { font-size: 12px; color: var(--c-muted); margin-top: 2px; }

/* ガイドカード */
.guide-card {
  text-align: center; background: var(--c-surface2);
  border: 2px dashed var(--c-border); border-radius: var(--radius-lg);
  padding: 32px 20px; margin-top: 24px;
}
.guide-icon { font-size: 42px; margin-bottom: 12px; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-7px)} }
.guide-title { font-weight: 700; font-size: 16px; margin-bottom: 8px; }
.guide-desc  { font-size: 13px; line-height: 1.7; color: var(--c-muted); }

/* =============================================
   メイン画面
============================================= */
#screen-main { overflow: hidden; }
.main-header {
  padding: 12px 16px; border-bottom: 1px solid var(--c-border);
  display: flex; justify-content: center; align-items: center; position: relative;
  min-height: 52px; background: var(--c-surface);
}
.back-btn {
  position: absolute; left: 12px;
  font-size: 13px; color: var(--c-primary); cursor: pointer; padding: 4px 6px;
}
.header-title-wrap { display: flex; align-items: center; gap: 2px; }
.header-title-wrap h3 {
  font-size: 17px; font-weight: 700;
  max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.main-content { flex: 1; overflow-y: auto; padding: 12px 16px 80px; position: relative; }

/* タブバー */
.tab-bar {
  display: flex; border-top: 1px solid var(--c-border);
  background: var(--c-surface);
  padding-bottom: env(safe-area-inset-bottom);
}
.tab-item {
  flex: 1; text-align: center; padding: 12px 0;
  cursor: pointer; font-size: 12px; color: var(--c-muted);
  transition: color .15s, border-top .15s;
  border-top: 3px solid transparent;
}
.tab-item.active { color: var(--c-primary); font-weight: 700; border-top-color: var(--c-primary); }
.tab-icon { font-size: 16px; display: block; margin-bottom: 2px; }

/* =============================================
   しおり カテゴリ
============================================= */
/* カテゴリ定義は JS で管理、色はここで宣言 */
.cat-dot {
  width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
}
.cat-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 2px 7px; border-radius: 20px;
  font-weight: 600; margin-top: 2px;
}

.cal-day-block {
  background: var(--c-surface2); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); margin-bottom: 12px; overflow: hidden;
}
.cal-day-header {
  background: linear-gradient(90deg, var(--c-primary) 0%, var(--c-primary-d) 100%);
  color: #fff; padding: 8px 14px; font-size: 13px; font-weight: 700;
}
.cal-events { padding: 8px 12px; }
.cal-event-row {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 8px 0; border-bottom: 1px solid var(--c-border);
}
.cal-event-row:last-child { border-bottom: none; }
.cal-event-time { font-size: 12px; font-weight: 700; color: var(--c-primary); min-width: 40px; padding-top: 2px; }
.cal-event-body { flex: 1; }
.cal-event-text { font-size: 14px; }
.cal-event-actions { display: flex; gap: 4px; flex-shrink: 0; align-items: center; }
.cal-event-btn {
  background: none; border: none; font-size: 14px; cursor: pointer;
  color: var(--c-muted); padding: 2px 4px; border-radius: 4px; transition: background .15s;
}
.cal-event-btn:hover { background: var(--c-border); }

/* =============================================
   行き先
============================================= */
.btn-like {
  background: var(--c-surface); color: #94a3b8;
  border: 1.5px solid var(--c-border);
  padding: 5px 0; font-size: 13px;
  border-radius: 20px; width: 54px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; gap: 3px;
  cursor: pointer; transition: all .15s;
}
.btn-like:hover  { border-color: #fca5a5; color: #f43f5e; }
.btn-like.liked  { background: #fff1f2; color: #f43f5e; border-color: #fecdd3; font-weight: 700; }
.btn-like:active { transform: scale(.93); }
.spot-map-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; color: var(--c-primary); text-decoration: none;
  background: #e0f2fe; padding: 3px 8px; border-radius: 20px; margin-top: 4px;
}

/* ステータスバー */
.status-bar {
  display: flex; gap: 8px; background: var(--c-surface);
  border: 1px solid var(--c-border); border-radius: var(--radius-md);
  padding: 10px; margin-bottom: 14px; box-shadow: var(--shadow-sm);
}
.status-cell { flex: 1; text-align: center; }
.status-cell-label { font-size: 11px; color: var(--c-muted); }
.status-cell-value { font-size: 12px; font-weight: 700; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.status-active  { color: var(--c-primary); }
.status-waiting { color: var(--c-muted); }
.status-done    { color: var(--c-green); }
.status-divider { width: 1px; background: var(--c-border); margin: 2px 0; }

/* 確定バナー */
.confirmed-banner {
  background: #eff6ff; border: 1px solid #bfdbfe;
  border-left: 4px solid #3b82f6; border-radius: var(--radius-sm);
  padding: 10px 12px; font-size: 12px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center; gap: 8px;
  color: var(--c-text);
}
[data-theme="dark"] .confirmed-banner { background: #1e3a5f; border-color: #3b82f6; }

/* 投票 */
.poll-card {
  background: var(--c-surface2); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 16px;
  margin-bottom: 14px; border-top: 4px solid var(--c-primary);
}
.poll-title { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
.poll-desc  { font-size: 12px; color: var(--c-muted); margin-bottom: 12px; }
.poll-deadline { font-size: 12px; font-weight: 700; margin-bottom: 12px; }
.poll-deadline.expired { color: var(--c-red); }
.poll-deadline.active  { color: var(--c-green); }
.poll-deadline.none    { color: var(--c-muted); }
.poll-option {
  background: var(--c-surface); border: 1.5px solid var(--c-border);
  border-radius: var(--radius-sm); padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 8px; gap: 8px;
}
.poll-option.voted { border-color: var(--c-green); background: #f0fdf4; }
[data-theme="dark"] .poll-option.voted { background: #052e16; }
.poll-option-info { flex: 1; }
.poll-option-name  { font-size: 14px; font-weight: 600; word-break: break-all; }
.poll-option-votes { font-size: 12px; color: var(--c-primary); font-weight: 700; margin-top: 2px; }
.poll-option-bar   { height: 4px; background: var(--c-border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.poll-option-bar-fill { height: 100%; background: var(--c-primary); border-radius: 2px; transition: width .4s; }
.poll-option-actions { display: flex; gap: 4px; flex-shrink: 0; }
.poll-section-label { font-size: 11px; font-weight: 700; color: var(--c-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
.poll-row { display: flex; gap: 6px; margin-bottom: 10px; }
.poll-row input { flex: 1; margin: 0; }
.poll-separator { border: none; border-top: 1px dashed var(--c-border); margin: 14px 0; }

/* =============================================
   お金タブ
============================================= */
.money-summary {
  background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
  color: #fff; border-radius: var(--radius-md); padding: 16px; margin-bottom: 14px;
}
.money-summary-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
.money-summary-total { font-size: 22px; font-weight: 700; }
.money-member-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.money-member-card {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-sm); padding: 10px 12px; box-shadow: var(--shadow-sm);
  border-top: 3px solid #ccc; /* JS で上書き */
}
.money-member-name { font-size: 12px; color: var(--c-muted); margin-bottom: 2px; display: flex; align-items: center; gap: 5px; }
.money-member-avatar {
  width: 18px; height: 18px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.money-member-paid { font-size: 14px; font-weight: 700; }
.money-member-diff { font-size: 12px; font-weight: 700; margin-top: 2px; }
.diff-positive { color: var(--c-green); }
.diff-negative { color: var(--c-red); }

/* 清算フロービジュアル */
.settlement-graph {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 14px; margin-bottom: 14px;
}
.settlement-graph-title { font-size: 13px; font-weight: 700; margin-bottom: 12px; }
.settlement-route {
  display: flex; align-items: center;
  padding: 10px 12px; background: var(--c-surface2);
  border-radius: var(--radius-md); margin-bottom: 8px;
  border: 1px solid var(--c-border);
  gap: 0;
}
.settlement-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.settlement-name { font-size: 12px; font-weight: 700; margin-top: 2px; }
.settlement-person { display: flex; flex-direction: column; align-items: center; gap: 2px; min-width: 48px; }
.settlement-arrow-wrap {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 0 8px;
}
.settlement-arrow-line {
  height: 3px; width: 100%; border-radius: 2px;
  background: linear-gradient(90deg, var(--c-red), var(--c-green));
  position: relative;
}
.settlement-arrow-line::after {
  content: ''; position: absolute; right: -6px; top: -6px;
  font-size: 13px; color: var(--c-green);
}
.settlement-amount-label {
  font-size: 13px; font-weight: 700; color: var(--c-primary);
}

/* カテゴリアイコン（支払い） */
.money-cat-icon {
  font-size: 18px; flex-shrink: 0;
}
.okane-item {
  background: var(--c-surface); border: 1px solid var(--c-border);
  border-radius: var(--radius-md); padding: 12px 14px;
  margin-bottom: 8px; display: flex; align-items: flex-start; gap: 10px;
  box-shadow: var(--shadow-sm);
}
.okane-item-main { flex: 1; font-size: 14px; word-break: break-all; }
.okane-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
.okane-item-payer { font-weight: 700; }
.okane-item-amount { font-size: 15px; font-weight: 700; color: var(--c-primary); }
.okane-item-desc { font-size: 12px; color: var(--c-muted); }

/* 支払い履歴バッジ */
.split-detail-badge {
  display: inline-flex; align-items: center; gap: 3px;
  border-radius: 20px; padding: 2px 8px;
  font-size: 11px; color: #fff; margin: 2px 2px 0 0;
  font-weight: 600;
}

/* =============================================
   割り勘フォーム
============================================= */
.split-mode-toggle {
  display: flex; margin-bottom: 12px;
  border: 1.5px solid var(--c-border); border-radius: var(--radius-sm); overflow: hidden;
}
.split-mode-btn {
  flex: 1; padding: 9px 6px; border: none; background: var(--c-surface2);
  font-family: var(--font); font-size: 13px; font-weight: 600;
  cursor: pointer; color: var(--c-muted); transition: background .15s, color .15s;
}
.split-mode-btn.active { background: var(--c-primary); color: #fff; }

/* =============================================

============================================= */
function showLoading(v){ document.getElementById('loading').classList.toggle('active',v); }
function showToast(msg, type='info', dur=3000){
  const el = document.createElement('div');
  el.className=`toast ${type}`; el.textContent=msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(()=>{ el.classList.add('fade-out'); el.addEventListener('animationend',()=>el.remove()); }, dur);
}
function navigateTo(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); closeAllMenus(); }
function closeAllMenus(){ document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('show')); }
function escapeHtml(s){ if(s==null)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// メンバーカラーを取得（グループデータから）

}

/* =============================================
   カバーカラースウォッチ描画（共通）
============================================= */
function renderCoverSwatches(containerId, hiddenId) {
  const container = document.getElementById(containerId);
  const hidden    = document.getElementById(hiddenId);
  container.innerHTML = '';
  COVER_COLORS.forEach(color => {
    const btn = document.createElement('div');
    btn.className = 'cover-swatch' + (hidden.value === color ? ' selected' : '');
    btn.style.background = color;
    btn.addEventListener('click', () => {
      hidden.value = color;
      container.querySelectorAll('.cover-swatch').forEach(s=>s.classList.remove('selected'));
      btn.classList.add('selected');
    });
    container.appendChild(btn);
  });
}

onAuthStateChanged(auth, async user => {
  showLoading(true);
  if(user){
    myUID = user.uid;
    const ud = await getDoc(doc(db,'users',myUID));
    if(ud.exists()){
      loginUserName = ud.data().name;
      document.getElementById('txt-user-status').textContent = `${loginUserName} さん`;
      if(inviteGroupId) await joinGroupViaLink(inviteGroupId); else goToGroupScreen();
    } else { navigateTo('screen-setup-name'); showLoading(false); }
  } else {
    myUID = loginUserName = '';
    document.getElementById('input-login-email').value = '';
    document.getElementById('input-login-password').value = '';
    if(groupListUnsubscribe){ groupListUnsubscribe(); groupListUnsubscribe=null; }
    if(activeGroupUnsubscribe){ activeGroupUnsubscribe(); activeGroupUnsubscribe=null; }
    navigateTo('screen-login'); showLoading(false);
  }
});

document.getElementById('btn-login').addEventListener('click', async () => {
  const email=document.getElementById('input-login-email').value.trim();
  const pw=document.getElementById('input-login-password').value;
  if(!email||!pw) return showToast('メールアドレスとパスワードを入力してください','warning');
  showLoading(true);
  try{ await signInWithEmailAndPassword(auth,email,pw); }
  catch(err){ showToast({'auth/invalid-credential':'メールアドレスまたはパスワードが違います'}[err.code]||'ログインに失敗しました','error'); showLoading(false); }
});

document.getElementById('btn-register').addEventListener('click', async()=>{

   グループ管理
============================================= */
function goToGroupScreen(){ navigateTo('screen-group'); syncGroupList(); }

function syncGroupList(){
  if(groupListUnsubscribe) groupListUnsubscribe();
  showLoading(true);
  const q=query(collection(db,'groups'),where('members','array-contains',myUID));
  groupListUnsubscribe=onSnapshot(q, snap=>{
    const c=document.getElementById('group-container');
    c.innerHTML='';
    if(snap.empty){
      c.innerHTML=`<div class="guide-card"><div class="guide-icon"></div><div class="guide-title">旅の計画をはじめよう！</div><p class="guide-desc">右下の「＋」ボタンから新しい旅行グループを作ろう！</p></div>`;
      showLoading(false); return;
    }
    snap.forEach(ds=>{
      const data=ds.data(), gid=ds.id;
      const coverColor = data.coverColor || '#0ea5e9';
      const memberCount=Object.keys(data.memberNames||{}).length;
      const div=document.createElement('div');
      div.className='group-item';
      div.innerHTML=`
        <div class="group-cover" style="background:${coverColor};"></div>
        <div class="group-item-inner">
          <div class="group-item-body" data-gid="${gid}" data-gname="${escapeHtml(data.name)}">
            <div class="group-item-name">${escapeHtml(data.name)}</div>
            <div class="group-item-meta"> ${memberCount}人のメンバー</div>
          </div>
          <div class="menu-container">
            <button class="btn-ghost" data-menu="${gid}">⋮</button>
            <div class="dropdown-menu" id="menu-${gid}">
              <div data-action="edit-group" data-gid="${gid}" data-gname="${escapeHtml(data.name)}">編集</div>
              <div class="menu-delete" data-action="delete-group" data-gid="${gid}">削除</div>
            </div>
          </div>
        </div>`;
      c.appendChild(div);
    });
    showLoading(false);
  });
}

document.getElementById('group-container').addEventListener('click', e=>{
  const body=e.target.closest('.group-item-body');
  const menuBtn=e.target.closest('[data-menu]');
  const action=e.target.closest('[data-action]');
  if(body) openGroup(body.dataset.gid, body.dataset.gname);
  if(menuBtn){ e.stopPropagation(); const m=document.getElementById(`menu-${menuBtn.dataset.menu}`); const open=m.classList.contains('show'); closeAllMenus(); if(!open)m.classList.add('show'); }
  if(action){ e.stopPropagation();
    if(action.dataset.action==='edit-group') openGroupEditModal(action.dataset.gid, action.dataset.gname);
    if(action.dataset.action==='delete-group') deleteGroup(action.dataset.gid);
  }
});

document.getElementById('btn-open-create-group').addEventListener('click',()=>toggleGroupModal(true));
function toggleGroupModal(show){
  const modal=document.getElementById('group-modal');
  if(show){
    document.getElementById('new-group-name').value='';
    document.getElementById('create-cover-color').value='#0ea5e9';
    renderCoverSwatches('create-cover-colors','create-cover-color');
    createTempMembers=[{id:myUID, name:loginUserName}];
    renderCreateMembers();
    modal.classList.add('active');
  } else modal.classList.remove('active');
}

function renderCreateMembers(){
  const list=document.getElementById('create-member-list');
  list.innerHTML='';
  createTempMembers.forEach((m,i)=>{
    const tag=document.createElement('div');
    tag.className='member-tag';
    tag.innerHTML=escapeHtml(m.name)+(m.id!==myUID?` <button class="btn-del-member" data-idx="${i}">×</button>`:'');
    list.appendChild(tag);
  });
}

  const name=input.value.trim(); if(!name)return;

document.getElementById('btn-create-group').addEventListener('click', async()=>{
  const groupName=document.getElementById('new-group-name').value.trim();
  if(!groupName) return showToast('グループ名を入力してください','warning');
  const coverColor=document.getElementById('create-cover-color').value;
  showLoading(true);
  const ref=doc(collection(db,'groups'));
  const members=[], memberNames={}, memberColors={};
  createTempMembers.forEach((m,i)=>{ members.push(m.id); memberNames[m.id]=m.name; memberColors[m.id]=MEMBER_COLORS[i%MEMBER_COLORS.length]; });
  await setDoc(ref,{name:groupName, coverColor, members, memberNames, memberColors, shiori:[], yukisaki:[], okane:[]});
  toggleGroupModal(false);
  openGroup(ref.id, groupName);
});
document.getElementById('btn-cancel-create-group').addEventListener('click',()=>toggleGroupModal(false));

function openGroupEditModal(gid, name){
  closeAllMenus();
  document.getElementById('edit-group-id').value=gid;
  document.getElementById('input-edit-group-name').value=name;
  document.getElementById('group-edit-modal').classList.add('active');
}
document.getElementById('btn-save-group-edit').addEventListener('click', async()=>{
  const gid=document.getElementById('edit-group-id').value;
  const n=document.getElementById('input-edit-group-name').value.trim();
  if(!n) return showToast('グループ名を入力してください','warning');
  showLoading(true);
  await updateDoc(doc(db,'groups',gid),{name:n});

document.getElementById('btn-close-group-edit').addEventListener('click',()=>document.getElementById('group-edit-modal').classList.remove('active'));

async function deleteGroup(gid){
  closeAllMenus();
  if(!confirm('本当にこのグループを削除しますか？\nすべてのデータが消去されます。'))return;
  showLoading(true);
  try{ await deleteDoc(doc(db,'groups',gid)); showToast('グループを削除しました','info'); }
  catch{ showToast('削除に失敗しました','error'); } finally{ showLoading(false); }
}

async function joinGroupViaLink(groupId){
  try{
    const ref=doc(db,'groups',groupId), snap=await getDoc(ref);
    if(snap.exists()){
      const upd={members:arrayUnion(myUID)}; upd[`memberNames.${myUID}`]=loginUserName;
      upd[`memberColors.${myUID}`]=MEMBER_COLORS[Object.keys(snap.data().memberNames||{}).length%MEMBER_COLORS.length];
      await updateDoc(ref,upd);
      window.history.replaceState({},document.title,window.location.pathname);
      openGroup(groupId,snap.data().name);
    } else { showToast('グループが見つかりません','error'); goToGroupScreen(); }
  } catch{ showToast('参加に失敗しました','error'); goToGroupScreen(); }
}

function openGroup(groupId, groupName){

document.getElementById('btn-open-group-settings').addEventListener('click',()=>{
  closeAllMenus();
  document.getElementById('edit-group-name-input').value=currentGroupData.name;
  const coverColor=currentGroupData.coverColor||'#0ea5e9';
  document.getElementById('settings-cover-color').value=coverColor;
  renderCoverSwatches('settings-cover-colors','settings-cover-color');
  tempMembers={...currentGroupData.memberNames};
  tempMemberColors={...currentGroupData.memberColors};
  renderModalMembers();
  renderMemberColorSettings();
  document.getElementById('group-settings-modal').classList.add('active');
});

function renderMemberColorSettings(){
  const container=document.getElementById('member-color-settings');
  container.innerHTML='';
  Object.keys(tempMembers).forEach(uid=>{
    const name=tempMembers[uid];
    const currentColor=tempMemberColors[uid]||MEMBER_COLORS[0];
    const row=document.createElement('div');
    row.className='member-color-row';
    const swatches=MEMBER_COLORS.map(c=>`<div class="color-swatch ${c===currentColor?'selected':''}" style="background:${c};" data-uid="${uid}" data-color="${c}"></div>`).join('');
    row.innerHTML=`<div class="member-color-name"><span style="display:inline-flex;width:14px;height:14px;border-radius:50%;background:${currentColor};margin-right:5px;vertical-align:middle;"></span>${escapeHtml(name)}</div><div class="color-swatch-grid">${swatches}</div>`;
    container.appendChild(row);
  });
  container.addEventListener('click', e=>{
    const sw=e.target.closest('.color-swatch');
    if(!sw)return;
    const {uid, color}=sw.dataset;
    tempMemberColors[uid]=color;
    // 同じUIDの行のみ更新
    container.querySelectorAll(`.color-swatch[data-uid="${uid}"]`).forEach(s=>{
      s.classList.toggle('selected',s.dataset.color===color);
    });
    // アバター色プレビュー更新
    const nameEl=sw.closest('.member-color-row')?.querySelector('.member-color-name span');
    if(nameEl) nameEl.style.background=color;
  });
}

function renderModalMembers(){
  const list=document.getElementById('modal-member-list');
  list.innerHTML='';
  Object.keys(tempMembers).forEach(id=>{
    const tag=document.createElement('div');
    tag.className='member-tag';
    tag.innerHTML=escapeHtml(tempMembers[id])+(id!==myUID?` <button class="btn-del-member" data-mid="${id}">×</button>`:'');

}
document.getElementById('modal-member-list').addEventListener('click', e=>{ const b=e.target.closest('.btn-del-member'); if(b){delete tempMembers[b.dataset.mid]; delete tempMemberColors[b.dataset.mid]; renderModalMembers(); renderMemberColorSettings();} });

   コンテンツ描画
============================================= */
function renderContent(){
  const c=document.getElementById('main-content-area');
  c.innerHTML='';
  if(!currentGroupData)return;
  if(currentTab==='しおり') renderShiori(c);
  else if(currentTab==='行き先') renderYukisaki(c);
  else if(currentTab==='お金') renderOkane(c);
}

/* ---- しおり ---- */
function renderShiori(container){
  const list=[...(currentGroupData.shiori||[])].sort((a,b)=>{
    const da=a.day||'1', db2=b.day||'1';
    return da!==db2?Number(da)-Number(db2):a.time.localeCompare(b.time);
  });
  if(list.length===0){ container.innerHTML='<div class="empty-state"> 右下の「＋」からスケジュールを追加しよう！</div>'; return; }
  const days={};

function renderOkane(container){
  const memberIds=Object.keys(currentGroupData.memberNames||{});
  const okaneList=currentGroupData.okane||[];
  let total=0;
  const memberPaid={}, memberOwes={};
  memberIds.forEach(id=>{ memberPaid[id]=0; memberOwes[id]=0; });
  okaneList.forEach(e=>{
    total+=e.amount;
    if(memberPaid[e.uid]!==undefined) memberPaid[e.uid]+=e.amount;
    if(e.splits&&Object.keys(e.splits).length>0){
      Object.entries(e.splits).forEach(([uid,amt])=>{ if(memberOwes[uid]!==undefined) memberOwes[uid]+=amt; });
    } else {
      const share=Math.round(e.amount/memberIds.length);
      memberIds.forEach(id=>{ memberOwes[id]+=share; });

          </div>

            <div class="settlement-avatar" style="background:${toColor};">${escapeHtml(getInitial(r.to))}</div>
            <div class="settlement-name" style="color:${toColor};">${escapeHtml(r.to)}</div>

      });

      const p=document.createElement('p'); p.style.cssText='font-size:13px;color:var(--c-green);text-align:center;padding:8px;'; p.textContent=' 清算不要！全員均等です。'; container.appendChild(p);

    div.addEventListener('click', e=>{

      if(mb){ e.stopPropagation(); const m=document.getElementById(`menu-${mb.dataset.menu2}`); const op=m.classList.contains('show'); closeAllMenus(); if(!op)m.classList.add('show'); }
      if(act){ e.stopPropagation(); if(act.dataset.action2==='edit')openEditItem(act.dataset.id); if(act.dataset.action2==='delete')deleteItem(act.dataset.id); }
    });

}

function getMemberColorByName(uid){
  return (currentGroupData?.memberColors||{})[uid]||MEMBER_COLORS[Object.keys(currentGroupData?.memberNames||{}).indexOf(uid)%MEMBER_COLORS.length]||'#64748b';
}

function calcSettlement(diffMap, memberNames){
  let debits=[], credits=[];
  Object.keys(diffMap).forEach(id=>{ const a=diffMap[id]; if(a<-1)debits.push({id,amount:Math.abs(a)}); else if(a>1)credits.push({id,amount:a}); });
  const routes=[]; let i=0,j=0;
  while(i<debits.length&&j<credits.length){
    const deb=debits[i], cre=credits[j], settled=Math.min(deb.amount,cre.amount);
    routes.push({fromId:deb.id, from:memberNames[deb.id]||'不明', toId:cre.id, to:memberNames[cre.id]||'不明', amount:Math.round(settled)});
    deb.amount-=settled; cre.amount-=settled;
    if(deb.amount<=1)i++; if(cre.amount<=1)j++;
  }
  return routes;
}

function buildPollCard(type, title, desc, poll, placeholder){
  const card=document.createElement('div'); card.className='poll-card';
  const expired=poll.deadline?(new Date(poll.deadline)<new Date()):false;
  const total=(poll.options||[]).reduce((s,o)=>s+(o.votes||[]).length,0);
  let optsHTML='';
  if((poll.options||[]).length>0){
    poll.options.forEach(opt=>{
      const votes=opt.votes||[], pct=total>0?Math.round(votes.length/total*100):0, voted=votes.includes(myUID);
      optsHTML+=`<div class="poll-option ${voted?'voted':''}">
        <div class="poll-option-info"><div class="poll-option-name">${escapeHtml(opt.name)}</div><div class="poll-option-votes">${votes.length}票 (${pct}%)</div><div class="poll-option-bar"><div class="poll-option-bar-fill" style="width:${pct}%"></div></div></div>
        <div class="poll-option-actions">
          <button class="btn btn-sm ${voted?'btn-success':'btn-primary'}" data-action="vote" data-type="${type}" data-optid="${opt.id}" ${expired?'disabled style="background:#cbd5e1;"':''}>${voted?'':'投票'}</button>
          <button class="btn btn-sm" style="background:#f59e0b;color:#fff;" data-action="finalize" data-type="${type}" data-optname="${escapeHtml(opt.name)}">確定</button>
          <button class="btn btn-sm btn-danger" data-action="del-option" data-type="${type}" data-optid="${opt.id}">削</button>
        </div>
      </div>`;
    });
  } else optsHTML='<p style="font-size:13px;color:var(--c-muted);text-align:center;padding:12px 0;">候補がまだありません</p>';
  const dlClass=!poll.deadline?'none':expired?'expired':'active';
  const dlText=!poll.deadline?'未設定':`${poll.deadline.replace('T',' ')} ${expired?'（締切）':''}`;
  card.innerHTML=`<div class="poll-title">${title}</div><div class="poll-desc">${desc}</div><div class="poll-deadline ${dlClass}"> 期限: ${dlText}</div>${optsHTML}
    <hr class="poll-separator">
    <div class="poll-section-label">候補を追加</div>
    <div class="poll-row"><input type="text" id="input-poll-${type}" placeholder="${placeholder}"><button class="btn btn-primary btn-sm" data-action="add-option" data-type="${type}">追加</button></div>
    <div class="poll-section-label">投票期限</div>
    <div class="poll-row"><input type="datetime-local" id="input-deadline-${type}" value="${poll.deadline||''}"><button class="btn btn-sm" style="background:#64748b;color:#fff;" data-action="set-deadline" data-type="${type}">設定</button></div>
    <div class="poll-section-label">直接決定</div>
    <div class="poll-row"><input type="text" id="input-direct-${type}" placeholder="候補外の項目を直接決める場合"><button class="btn btn-sm" style="background:#f59e0b;color:#fff;" data-action="direct-finalize" data-type="${type}">決定</button></div>`;
  card.addEventListener('click', e=>{
    const el=e.target.closest('[data-action]'); if(!el)return;
    const t=el.dataset.type;
    if(el.dataset.action==='vote') voteOpt(t,el.dataset.optid);
    if(el.dataset.action==='finalize') setFinal(t,el.dataset.optname);
    if(el.dataset.action==='del-option') delOpt(t,el.dataset.optid);
    if(el.dataset.action==='add-option') addOpt(t);
    if(el.dataset.action==='set-deadline') saveDeadline(t);
    if(el.dataset.action==='direct-finalize'){ const v=document.getElementById(`input-direct-${t}`)?.value.trim(); if(v)setFinal(t,v); }
  });
  return card;
}

  document.querySelectorAll('#split-member-checkboxes input[data-uid]').forEach(cb=>{
    const el=document.getElementById(`share-${cb.dataset.uid}`); if(!el)return;
    if(!cb.checked){el.textContent='—';return;}
    const isLast=checked[checked.length-1]===cb.dataset.uid;
    el.textContent=`¥${(isLast?share+rem:share).toLocaleString()}`;
  });
  const p=document.getElementById('split-even-preview');
  p.textContent=count===0?'対象者を選んでください':amount===0?'金額を入力してください':`${count}人で割り勘 → 1人あたり ¥${share.toLocaleString()}${rem>0?`（最後+¥${rem}）`:''}`;
}
function getCheckedUids(){ return[...document.querySelectorAll('#split-member-checkboxes input[data-uid]:checked')].map(cb=>cb.dataset.uid); }
function renderManualInputs(memberNames, existing={}){
  const c=document.getElementById('split-manual-inputs'); c.innerHTML='';
  Object.entries(memberNames).forEach(([uid,name])=>{
    const color=getMemberColor(uid);
    const row=document.createElement('div'); row.className='split-manual-row';
    row.innerHTML=`<div style="display:flex;align-items:center;gap:5px;min-width:80px;"><span class="money-member-avatar" style="background:${color};">${escapeHtml(getInitial(name))}</span><label style="font-size:13px;">${escapeHtml(name.length>5?name.slice(0,5)+'…':name)}</label></div><input type="number" data-uid="${uid}" value="${existing[uid]||0}" min="0"><span class="yen-label">円</span>`;
    c.appendChild(row);
  });
  c.addEventListener('input',updateManualTotal);
  updateManualTotal();
}
function updateManualTotal(){
  const total=parseInt(document.getElementById('input-money-amount').value)||0;
  let sum=0; document.querySelectorAll('#split-manual-inputs input[data-uid]').forEach(inp=>sum+=parseInt(inp.value)||0);
  const el=document.getElementById('split-manual-total'), diff=sum-total;
  if(total===0) el.innerHTML='<span>入力合計</span><span>金額を入力してください</span>';
  else if(diff===0) el.innerHTML=`<span>入力合計</span><span class="total-ok">¥${sum.toLocaleString()}  ぴったり！</span>`;
  else el.innerHTML=`<span>入力合計</span><span class="total-ng">¥${sum.toLocaleString()} (${diff>0?'+':''}${diff.toLocaleString()}円 ズレあり)</span>`;
}
document.getElementById('input-money-amount').addEventListener('input',()=>{ if(splitMode==='even')updateEvenPreview(); else updateManualTotal(); });

/* =============================================
   しおり 日程セレクト生成（日程確定連携）
============================================= */
function buildShioriDaySelect(selectedDay='1'){
  const sel=document.getElementById('input-shiori-day');
  sel.innerHTML='';
  const dp=currentGroupData?.datePoll;
  // 確定日程があれば日数を解析
  let maxDays=7;
  if(dp?.finalValue){
    // 「3日間」「8/11〜8/13」「8/11-8/13」などをパース
    const dayMatch=dp.finalValue.match(/(\d+)\s*日間/);
    const rangeMatch=dp.finalValue.match(/(\d+)[\/\-](\d+)[〜～~\/\-](\d+)[\/\-](\d+)/);
    if(dayMatch) maxDays=parseInt(dayMatch[1]);
    else if(rangeMatch){ const d1=parseInt(rangeMatch[2]),d2=parseInt(rangeMatch[4]); const diff=d2-d1+1; if(diff>0&&diff<=14)maxDays=diff; }
    else maxDays=7;
  }
  for(let i=1;i<=maxDays;i++){
    const opt=document.createElement('option'); opt.value=String(i); opt.textContent=`${i}日目`; if(String(i)===String(selectedDay))opt.selected=true; sel.appendChild(opt);
  }
}

/* =============================================
   アイテム CRUD
============================================= */
document.getElementById('btn-add-item').addEventListener('click', openItemModal);
function openItemModal(){
  if(currentTab==='行き先'){
    const dp=currentGroupData.datePoll||{}, bp=currentGroupData.budgetPoll||{}, de=currentGroupData.destinationPoll||{};
    if(!dp.finalValue||!bp.finalValue||!de.finalValue){ showToast('日程・予算・目的地が確定してからスポットを追加できます','warning'); return; }
  }
  document.getElementById('edit-id').value='';
  document.getElementById('item-modal-title').textContent=`${currentTab}の追加`;
  ['form-shiori','form-yukisaki','form-okane'].forEach(id=>document.getElementById(id).style.display='none');
  const formMap={'しおり':'form-shiori','行き先':'form-yukisaki','お金':'form-okane'};
  document.getElementById(formMap[currentTab]).style.display='block';
  if(currentTab==='しおり'){ renderShioriCatGrid(); buildShioriDaySelect(); document.getElementById('input-shiori-text').value=''; document.getElementById('input-time').value='10:00'; }
  if(currentTab==='行き先'){ document.getElementById('input-spot-name').value=''; document.getElementById('input-spot-url').value=''; }
  if(currentTab==='お金'){
    renderMoneyCatGrid();
    const sel=document.getElementById('input-money-name'); sel.innerHTML='';
    Object.entries(currentGroupData?.memberNames||{}).forEach(([uid,name])=>{ const o=document.createElement('option'); o.value=uid; o.textContent=name; sel.appendChild(o); });
    document.getElementById('input-money-amount').value='';
    document.getElementById('input-money-text').value='';
    setSplitMode('even');
    renderSplitCheckboxes(currentGroupData?.memberNames||{});
    renderManualInputs(currentGroupData?.memberNames||{});
  }
  document.getElementById('item-modal').classList.add('active');
}
function openEditItem(id){
  openItemModal();
  document.getElementById('edit-id').value=id;
  document.getElementById('item-modal-title').textContent=`${currentTab}の編集`;
  if(currentTab==='しおり'){
    const item=currentGroupData.shiori.find(i=>i.id===id);
    if(item){ renderShioriCatGrid(item.cat||'other'); buildShioriDaySelect(item.day||'1'); document.getElementById('input-time').value=item.time; document.getElementById('input-shiori-text').value=item.text; document.getElementById('input-shiori-cat').value=item.cat||'other'; }
  } else if(currentTab==='行き先'){
    const item=currentGroupData.yukisaki.find(i=>i.id===id);
    if(item){ document.getElementById('input-spot-name').value=item.name; document.getElementById('input-spot-url').value=item.url||''; }
  } else if(currentTab==='お金'){
    const item=(currentGroupData.okane||[]).find(i=>i.id===id);
    if(item){
      renderMoneyCatGrid(item.cat||'other');
      document.getElementById('input-money-cat').value=item.cat||'other';
      document.getElementById('input-money-name').value=item.uid;
      document.getElementById('input-money-amount').value=item.amount;
      document.getElementById('input-money-text').value=item.text;
      const mn=currentGroupData.memberNames||{};
      if(item.splits&&Object.keys(item.splits).length>0){
        const allSame=Object.values(item.splits).every(v=>v===Object.values(item.splits)[0]);
        if(allSame){ setSplitMode('even'); renderSplitCheckboxes(mn,Object.keys(item.splits).filter(uid=>item.splits[uid]>0)); renderManualInputs(mn,item.splits); }
        else{ setSplitMode('manual'); renderSplitCheckboxes(mn); renderManualInputs(mn,item.splits); }
      } else{ setSplitMode('even'); renderSplitCheckboxes(mn); renderManualInputs(mn); }
      updateEvenPreview();
    }
  }
}
document.getElementById('btn-save-item').addEventListener('click', saveItem);
document.getElementById('btn-cancel-item').addEventListener('click',()=>document.getElementById('item-modal').classList.remove('active'));

async function saveItem(){
  const idInput=document.getElementById('edit-id').value;
  const isEdit=idInput!=='', itemId=isEdit?idInput:'item_'+Date.now();
  let shioriList=[...(currentGroupData.shiori||[])];
  let yukisakiList=[...(currentGroupData.yukisaki||[])];
  let okaneList=[...(currentGroupData.okane||[])];

  if(currentTab==='しおり'){
    const day=document.getElementById('input-shiori-day').value;
    const time=document.getElementById('input-time').value;
    const text=document.getElementById('input-shiori-text').value.trim();
    const cat=document.getElementById('input-shiori-cat').value||'other';
    if(!text)return showToast('内容を入力してください','warning');
    if(isEdit){const i=shioriList.find(i=>i.id===itemId);if(i){i.day=day;i.time=time;i.text=text;i.cat=cat;}}
    else shioriList.push({id:itemId,day,time,text,cat});
  } else if(currentTab==='行き先'){
    const name=document.getElementById('input-spot-name').value.trim();
    const url=document.getElementById('input-spot-url').value.trim();
    if(!name)return showToast('スポット名を入力してください','warning');
    if(isEdit){const i=yukisakiList.find(i=>i.id===itemId);if(i){i.name=name;i.url=url;if(!i.likes)i.likes=[];}}
    else yukisakiList.push({id:itemId,name,url,likes:[]});
  } else if(currentTab==='お金'){
    const uid=document.getElementById('input-money-name').value;
    const amount=parseInt(document.getElementById('input-money-amount').value);
    const text=document.getElementById('input-money-text').value.trim();
    const cat=document.getElementById('input-money-cat').value||'other';
    if(!uid||isNaN(amount)||amount<=0)return showToast('金額を正しく入力してください','warning');
    let splits={};
    if(splitMode==='even'){
      const uids=getCheckedUids();
      if(uids.length===0)return showToast('割り勘の対象者を選んでください','warning');
      const share=Math.floor(amount/uids.length), rem=amount-share*uids.length;
      uids.forEach((u,idx)=>splits[u]=idx===uids.length-1?share+rem:share);
    } else {
      const inputs=document.querySelectorAll('#split-manual-inputs input[data-uid]');
      let sum=0; inputs.forEach(inp=>{ const v=parseInt(inp.value)||0; splits[inp.dataset.uid]=v; sum+=v; });
      if(Math.abs(sum-amount)>0)return showToast(`合計¥${amount.toLocaleString()}と負担合計¥${sum.toLocaleString()}が一致しません`,'warning');
    }
    const entry={id:itemId,uid,amount,text,cat,splits};
    if(isEdit){const idx=okaneList.findIndex(i=>i.id===itemId);if(idx>=0)okaneList[idx]=entry;}
    else okaneList.push(entry);
  }
  showLoading(true);
  try{
    await updateDoc(doc(db,'groups',currentGroupId),{shiori:shioriList,yukisaki:yukisakiList,okane:okaneList});
    document.getElementById('item-modal').classList.remove('active');
    showToast('保存しました','success');
  } catch{ showToast('保存に失敗しました','error'); } finally{ showLoading(false); }
}

async function deleteItem(id){
  if(!confirm('本当に削除しますか？'))return;
  showLoading(true);
  try{
    await updateDoc(doc(db,'groups',currentGroupId),{
      shiori:(currentGroupData.shiori||[]).filter(i=>i.id!==id),
      yukisaki:(currentGroupData.yukisaki||[]).filter(i=>i.id!==id),
      okane:(currentGroupData.okane||[]).filter(i=>i.id!==id),
    });
    showToast('削除しました','info');
  } catch{ showToast('削除に失敗しました','error'); } finally{ showLoading(false); }
}
async function toggleSpotLike(spotId){
  showLoading(true);
  try{
    const updated=[...(currentGroupData.yukisaki||[])].map(item=>{
      if(item.id!==spotId)return item;
      const likes=[...(item.likes||[])]; const idx=likes.indexOf(myUID);
      if(idx>=0)likes.splice(idx,1); else likes.push(myUID);
      return{...item,likes};
    });
    await updateDoc(doc(db,'groups',currentGroupId),{yukisaki:updated});
  } catch{ showToast('いいねの更新に失敗しました','error'); } finally{ showLoading(false); }
}

/* ESCキーでモーダルを閉じる */
document.addEventListener('keydown', e=>{
  if(e.key!=='Escape')return;
  ['item-modal','group-modal','group-edit-modal','group-settings-modal'].forEach(id=>document.getElementById(id).classList.remove('active'));
});
